<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study Hub -- KAIST BIZ.60010 Venture Capital</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --border:   #30363d;
  --gold:     #f0c040;
  --blue:     #58a6ff;
  --green:    #56d364;
  --muted:    #8b949e;
  --text:     #e6edf3;
  --text-dim: #c9d1d9;
  --red:      #ff7b72;
  --radius:   10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(88,166,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88,166,255,.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

#hub-page { position: relative; z-index: 1; min-height: 100vh; }

.hub-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(13,17,23,.9);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 0 32px;
  display: flex; align-items: center; gap: 0;
  height: 56px;
}
.hub-logo {
  font-size: 13px; font-weight: 700; color: var(--gold);
  letter-spacing: .3px; display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.hub-logo::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 8px var(--gold);
  flex-shrink: 0;
}
.hub-course {
  margin-left: auto; font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 16px;
}
.hub-course span { display: flex; align-items: center; gap: 5px; }
.back-btn {
  font-size: 11px; color: var(--muted); text-decoration: none;
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px;
  white-space: nowrap; transition: color .15s, border-color .15s;
}
.back-btn:hover { color: var(--text); border-color: var(--blue); }

.hub-hero {
  padding: 56px 32px 40px;
  max-width: 1100px; margin: 0 auto;
  border-bottom: 1px solid var(--border);
}
.hub-hero h1 {
  font-size: 28px; font-weight: 800; color: var(--text);
  letter-spacing: -.5px; margin-bottom: 8px;
}
.hub-hero h1 span { color: var(--gold); }
.hub-hero p { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 580px; }

.hub-main { padding: 36px 32px 80px; max-width: 1100px; margin: 0 auto; }

.hub-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}
.hub-section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.cases-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.case-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 22px 18px;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 0;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .1s, background .15s;
  position: relative; overflow: hidden;
}
.case-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(88,166,255,.04), transparent);
  opacity: 0; transition: opacity .2s;
}
.case-card:hover { border-color: rgba(88,166,255,.45); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.case-card:hover::before { opacity: 1; }
.case-card.available:hover { border-color: rgba(86,211,100,.45); }
.case-card.available::before { background: linear-gradient(135deg, rgba(86,211,100,.04), transparent); }
.case-card.coming { opacity: .55; cursor: default; pointer-events: none; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.card-num { font-size: 11px; font-family: 'SF Mono', monospace; color: var(--muted); font-weight: 600; }
.badge {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
  padding: 2px 8px; border-radius: 20px;
}
.badge.avail { background: rgba(86,211,100,.15); color: var(--green); border: 1px solid rgba(86,211,100,.3); }
.badge.soon  { background: rgba(139,148,158,.12); color: var(--muted); border: 1px solid rgba(139,148,158,.2); }

.card-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; margin-bottom: 6px; }
.card-org   { font-size: 12px; color: var(--blue); font-weight: 500; margin-bottom: 10px; }
.card-desc  { font-size: 12px; color: var(--muted); line-height: 1.6; flex: 1; }
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border);
}
.card-meta { font-size: 11px; color: var(--muted); }
.card-arrow { font-size: 14px; color: var(--muted); transition: color .15s, transform .15s; }
.case-card:hover .card-arrow { color: var(--text); transform: translateX(3px); }

.hub-footer {
  border-top: 1px solid var(--border);
  padding: 24px 32px; max-width: 1100px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
}
.hub-footer-left { font-size: 11px; color: var(--muted); line-height: 1.7; }
.hub-footer-right { font-size: 11px; color: var(--muted); text-align: right; }
.hub-footer a { color: var(--blue); text-decoration: none; }
.hub-footer a:hover { text-decoration: underline; }

.fade-in  { animation: fade-in .35s cubic-bezier(.16,1,.3,1) both; }
@keyframes fade-in  { from { opacity: 0; transform: translateY(12px); } }
</style>
</head>
<body>

<div id="hub-page" class="fade-in">
  <header class="hub-header">
    <a class="hub-logo" href="../">Case Hub</a>
    <div class="hub-course">
      <span>BIZ.60010 Venture Capital &bull; Spring 2026</span>
      <a class="back-btn" href="../">&#8592; 메인으로</a>
    </div>
  </header>

  <div class="hub-hero">
    <h1>Venture Capital <span>Cases</span></h1>
    <p>Prof. 백용욱 &mdash; HBS 케이스를 영한 대조로 읽고, 핵심 VC 용어를 사전에서 즉시 확인할 수 있습니다. 단어를 더블클릭하면 AI 설명이 표시됩니다.</p>
  </div>

  <main class="hub-main">
    <div class="hub-section-title">Sessions -- 10 Cases</div>
    <div class="cases-grid" id="cases-grid"></div>
  </main>

  <footer>
    <div class="hub-footer">
      <div class="hub-footer-left">
        Copyright &copy; Harvard Business School Publishing. Fair Use only.
      </div>
      <div class="hub-footer-right">
        Gyehyu K &bull; KAIST IMMS<br>
        <a href="mailto:gyehyukim@kaist.ac.kr">gyehyukim@kaist.ac.kr</a>
      </div>
    </div>
  </footer>
</div>

<script>
const AUTH_KEY = 'kaist-case-auth';
const AUTH_VAL = 'kaist2026';

// Redirect to top-level hub for login if not authenticated
if (sessionStorage.getItem(AUTH_KEY) !== AUTH_VAL) {
  location.href = '../';
}

const CASES = [
  {
    num: '01',
    title: 'TimeCredit',
    org: 'HBS 9-824-073',
    desc: 'AI 회계 스타트업 창업자의 자금 조달 딜레마. 목표액 $1.5M의 절반에서 라운드 종료 vs 계속 조달 결정.',
    tags: ['LLM', 'SAFE', 'Seed Round', 'AI SaaS'],
    session: 'Session 2',
    status: 'available',
    url: 'timecredit/',
  },
  {
    num: '02',
    title: 'Athleta Corporation',
    org: 'HBS 9-803-045',
    desc: '여성 스포츠 의류 멀티채널 기업의 Series E 조달. 닷컴 버블 붕괴 후 엔젤/은행 혼합 구조 협상.',
    tags: ['Series E', 'Angel', 'Term Sheet'],
    session: 'Session 3',
    status: 'available',
    url: 'athleta/',
  },
  {
    num: '03',
    title: 'Rock Solid Fitness',
    org: 'HBS Case (TBD)',
    desc: '소비재 스포츠 브랜드의 Series B 라운드. 전략적 투자자 vs. 재무적 투자자 선택 문제.',
    tags: ['Series B', 'Strategic Investor'],
    session: 'Session 4',
    status: 'coming',
    url: '../coming_soon.html?id=03&title=Rock+Solid+Fitness',
  },
  {
    num: '04',
    title: 'Cleantech Ventures',
    org: 'HBS Case (TBD)',
    desc: '클린에너지 스타트업의 그로스 라운드. ESG 투자 기준과 임팩트 밸류에이션 방법론.',
    tags: ['Growth Round', 'ESG', 'Impact Investing'],
    session: 'Session 5',
    status: 'coming',
    url: '../coming_soon.html?id=04&title=Cleantech+Ventures',
  },
  {
    num: '05',
    title: 'MedDevX Inc.',
    org: 'HBS Case (TBD)',
    desc: '의료기기 스타트업의 FDA 승인 전 Late-Stage 조달. 규제 리스크와 투자자 요구 조건 분석.',
    tags: ['MedTech', 'Late Stage', 'Regulatory Risk'],
    session: 'Session 6',
    status: 'coming',
    url: '../coming_soon.html?id=05&title=MedDevX+Inc',
  },
  {
    num: '06',
    title: 'NorthStar SaaS',
    org: 'HBS Case (TBD)',
    desc: 'B2B SaaS 플랫폼의 Series C. ARR 기반 밸류에이션과 Rule of 40 적용 사례.',
    tags: ['SaaS', 'ARR', 'Series C'],
    session: 'Session 7',
    status: 'coming',
    url: '../coming_soon.html?id=06&title=NorthStar+SaaS',
  },
  {
    num: '07',
    title: 'Global Logistics AI',
    org: 'HBS Case (TBD)',
    desc: 'AI 물류 최적화 스타트업의 Pre-IPO 라운드. Secondary Sale과 구주 거래 구조.',
    tags: ['AI', 'Pre-IPO', 'Secondary'],
    session: 'Session 8',
    status: 'coming',
    url: '../coming_soon.html?id=07&title=Global+Logistics+AI',
  },
  {
    num: '08',
    title: 'BioPharm Startup',
    org: 'HBS Case (TBD)',
    desc: '바이오테크 스타트업의 다운라운드. 반희석 조항 발동과 주주 간 이해충돌 해결 과정.',
    tags: ['BioTech', 'Down Round', 'Anti-dilution'],
    session: 'Session 9',
    status: 'coming',
    url: '../coming_soon.html?id=08&title=BioPharm+Startup',
  },
  {
    num: '09',
    title: 'RetailTech Korea',
    org: 'HBS Case (TBD)',
    desc: '국내 리테일테크 스타트업의 크로스보더 VC 투자 유치. 국내외 투자자 구조와 거버넌스.',
    tags: ['Retail', 'Cross-border VC', 'Governance'],
    session: 'Session 10',
    status: 'coming',
    url: '../coming_soon.html?id=09&title=RetailTech+Korea',
  },
  {
    num: '10',
    title: 'Quantum Compute Labs',
    org: 'HBS Case (TBD)',
    desc: '딥테크 스타트업의 엑싯 전략. IPO vs. M&A 선택과 투자자/창업자 이해관계 정렬.',
    tags: ['DeepTech', 'Exit', 'IPO vs M&A'],
    session: 'Session 11',
    status: 'coming',
    url: '../coming_soon.html?id=10&title=Quantum+Compute+Labs',
  },
];

function renderHub() {
  const grid = document.getElementById('cases-grid');
  grid.innerHTML = CASES.map(c => {
    const badgeClass = c.status === 'available' ? 'avail' : 'soon';
    const badgeText  = c.status === 'available' ? 'Available' : 'Coming Soon';
    const cardClass  = c.status === 'available' ? 'case-card available' : 'case-card coming';
    const tags = c.tags.map(t => '<span style="font-size:10px;background:rgba(88,166,255,.1);color:#58a6ff;border:1px solid rgba(88,166,255,.2);border-radius:4px;padding:1px 7px;margin-right:4px;">'+t+'</span>').join('');
    return '<a class="'+cardClass+'" href="'+c.url+'">' +
      '<div class="card-header">' +
        '<span class="card-num"># '+c.num+' &bull; '+c.session+'</span>' +
        '<span class="badge '+badgeClass+'">'+badgeText+'</span>' +
      '</div>' +
      '<div class="card-title">'+c.title+'</div>' +
      '<div class="card-org">'+c.org+'</div>' +
      '<div class="card-desc">'+c.desc+'</div>' +
      '<div style="margin-top:12px;line-height:2;">'+tags+'</div>' +
      '<div class="card-footer">' +
        '<span class="card-meta">'+(c.status === 'available' ? '영한 대조 + 사전 모드' : '준비 중')+'</span>' +
        '<span class="card-arrow">'+(c.status === 'available' ? '&#8594;' : '...')+'</span>' +
      '</div>' +
    '</a>';
  }).join('');
}

renderHub();
</script>
</body>
</html>
